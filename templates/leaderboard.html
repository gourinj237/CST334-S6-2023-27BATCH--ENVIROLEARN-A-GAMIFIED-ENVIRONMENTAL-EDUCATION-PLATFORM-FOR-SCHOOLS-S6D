<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e8f6f3;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            color: #2c3e50;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }

        .card {
            background: white;
            width: 300px;
            margin: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding-bottom: 15px;
        }

        .card h2 {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 15px 15px 0 0;
            margin: 0;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 8px;
            font-size: 18px;
        }

        .rank1 { background: #ffd700; }
        .rank2 { background: #c0c0c0; }
        .rank3 { background: #cd7f32; }

        .score {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

<h1> Leaderboard </h1>

<div class="container">

    {% for category, players in leaderboards.items() %}
    <div class="card">
        <h2>{{ category.capitalize() }}</h2>
        <ul>
            {% if players %}
                {% for player in players %}
                    <li class="
                        {% if loop.index == 1 %}rank1{% endif %}
                        {% if loop.index == 2 %}rank2{% endif %}
                        {% if loop.index == 3 %}rank3{% endif %}
                    ">
                        {{ loop.index }}. {{ player.username }} -
                        <span class="score">{{ player.max_score }}</span>
                    </li>
                {% endfor %}
            {% else %}
                <li>No players yet!</li>
            {% endif %}
        </ul>
    </div>
    {% endfor %}

</div>
    <script>
setInterval(function(){
    window.location.reload();
}, 5000);   
</script>
</body>
</html>
