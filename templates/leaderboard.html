<!DOCTYPE html>
<html>
<head>
<title>EnviroLearn Leaderboard</title>

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    padding:40px;
    min-height:100vh;

    background: linear-gradient(135deg,#d1fae5,#f0fdf4,#ecfccb);
}

/* Title */

h1{
    text-align:center;
    color:#14532d;
    font-size:42px;
    letter-spacing:1px;
    margin-bottom:30px;
}

/* Table */

table{
    width:95%;
    max-width:1100px;
    margin:auto;
    border-collapse:collapse;

    background:rgba(255,255,255,0.95);
    border-radius:18px;
    overflow:hidden;

    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* Header */

th{
    padding:16px;
    background:linear-gradient(135deg,#16a34a,#15803d);
    color:white;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:1px;
}

/* Cells */

td{
    padding:15px;
    text-align:center;
    font-size:15px;
}

/* Row styles */

tr:nth-child(even){
    background:#f0fdf4;
}

tr:hover{
    background:#dcfce7;
    transform:scale(1.01);
    transition:0.25s;
}

/* Top ranks */

.rank1{
    background:linear-gradient(135deg,#fff7cc,#f6e27a,#d4af37) !important;
    font-weight:bold;
}

.rank2{
    background:linear-gradient(135deg,#f5f5f5,#dcdcdc,#c0c0c0) !important;
    font-weight:bold;
}

.rank3{
    background:linear-gradient(135deg,#f2c89b,#cd7f32,#b87333) !important;
    font-weight:bold;
}

/* Total XP */

.total{
    font-weight:bold;
    font-size:16px;
    color:#065f46;
}

/* Current user highlight */

.me{
    outline:3px solid #065f46;
    outline-offset:-3px;
}

/* Back button */

.top-right{
    position:absolute;
    top:20px;
    right:30px;
}

.back-btn{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    padding:10px 20px;
    font-size:14px;
    font-weight:bold;

    border:none;
    border-radius:10px;
    cursor:pointer;

    box-shadow:0 6px 15px rgba(0,0,0,0.2);

    transition:0.25s;
}

.back-btn:hover{
    background:#15803d;
    transform:scale(1.07);
}

</style>
</head>


<body>

<div class="top-right">
<button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<h1>🏆 Leaderboard</h1>

<table>

<tr>
<th>Rank</th>
<th>Name</th>
<th>Class</th>
<th>Game XP</th>
<th>Quiz XP</th>
<th>Video XP</th>
<th>Challenge XP</th>
<th>Total XP</th>
</tr>


{% for student in leaderboard %}

<tr class="
{% if student.rank == 1 %}rank1
{% elif student.rank == 2 %}rank2
{% elif student.rank == 3 %}rank3
{% endif %}
{% if student.is_me %} me {% endif %}
">

<td>{{ student.rank }}</td>
<td>{{ student.name }}</td>
<td>{{ student.student_class }}</td>
<td>{{ student.game_xp }}</td>
<td>{{ student.quiz_xp }}</td>
<td>{{ student.video_xp }}</td>
<td>{{ student.reward }}</td>
<td class="total">{{ student.total }}</td>

</tr>

{% endfor %}

</table>

<script>
function goBack(){
window.location.href = "{{ url_for('index') }}";
}
</script>

</body>
</html>
