<!DOCTYPE html>
<html>
<head>
<title>Recycling & Waste Master</title>

<style>
body{
    margin:0;
    font-family:'Courier New', Courier, monospace;
    min-height:100vh;
    background: linear-gradient(120deg, #f6d365, #fda085);
    color:#222;
}


.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}


#question{
    font-size:20px;
    margin-bottom:20px;
}


.option{
    display:block;
    background:#f1f1f1;
    margin:10px 0;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
}

.option:hover{
    background:#ffe0cc;
}


#feedback{
    margin-top:15px;
    font-weight:bold;
    min-height:24px;
}


button{
    padding:12px 20px;
    margin-top:20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#ff7f50;
    color:white;
    cursor:pointer;
}

.btnRow{
    display:flex;                
    justify-content:flex-end;    
}


#scoreBox{
    text-align:right;
    font-weight:bold;
}


#endScreen{
    text-align:center;
    display:none;
}


.correct{
    background:#2ecc71 !important;
    color:white;
}

.wrong{
    background:#e74c3c !important;
    color:white;
}

</style>
</head>

<body>

<div class="container" id="quizBox">

<h1>♻️ Recycling & Waste Master</h1>

<div id="scoreBox">
Score: <span id="score">0</span>/10
</div>

<div id="question"></div>
<div id="options"></div>
<div id="feedback"></div>

<div class="btnRow">
    <button onclick="nextQuestion()">Next</button>
</div> 

</div>


<div class="container" id="endScreen">
    <h1>🎉 Waste Sorting Complete!</h1>
    <h2 id="finalScore"></h2>
    <p id="message"></p>
    <button onclick="location.reload()">Play Again</button>
</div>


<script>

const quiz = [
{
q:"What does recycling help reduce?",
o:["Pollution","Sunlight","Oceans","Mountains"],
a:0
},
{
q:"Which item can usually be recycled?",
o:["Plastic bottles","Food scraps","Used tissues","Broken glass mixed in trash"],
a:0
},
{
q:"Composting is best for:",
o:["Metal cans","Fruit peels","Plastic bags","Glass jars"],
a:1
},
{
q:"What color bin often represents recycling?",
o:["Blue","Black","Red","Brown"],
a:0
},
{
q:"Which action creates less waste?",
o:["Using reusable bags","Throwing plastic","Buying disposables","Littering"],
a:0
},
{
q:"Paper should be:",
o:["Burned","Recycled","Thrown in rivers","Ignored"],
a:1
},
{
q:"E-waste includes:",
o:["Banana peels","Old phones","Cardboard","Glass"],
a:1
},
{
q:"The 3Rs stand for:",
o:["Read, Run, Rest","Reduce, Reuse, Recycle","Ride, Roll, Return","Repair, Remove, Replace"],
a:1
},
{
q:"Which reduces plastic waste?",
o:["Reusable bottles","Single-use cups","Plastic wrapping","Disposable spoons"],
a:0
},
{
q:"Sorting waste correctly helps:",
o:["Landfills grow","Recycling process","Pollution increase","Animals suffer"],
a:1
}
];

let index=0;
let score=0;
let answered=false;

function loadQuestion(){
answered=false;
document.getElementById("feedback").textContent="";
let q=quiz[index];
document.getElementById("question").textContent=q.q;

let optionsHTML="";
q.o.forEach((opt,i)=>{
optionsHTML+=`<div class="option" onclick="select(${i})">${opt}</div>`;
});

document.getElementById("options").innerHTML=optionsHTML;
}

function select(i){
if(answered) return;
answered=true;

let correct=quiz[index].a;
let optionDivs=document.querySelectorAll(".option");

optionDivs.forEach((div,idx)=>{
    if(idx===correct){
        div.classList.add("correct");
    }
    if(idx===i && i!==correct){
        div.classList.add("wrong");
    }
    div.style.pointerEvents="none";
});

if(i===correct){
    score++;
    document.getElementById("feedback").textContent="🌟 Nice sorting! You're a waste master!";
}
else{
    document.getElementById("feedback").textContent="💚 Keep practicing — every effort helps Earth!";
}

document.getElementById("score").textContent=score;
}

function nextQuestion(){
if(!answered) return;

index++;

if(index>=quiz.length){
endQuiz();
return;
}

loadQuestion();
}

function endQuiz(){
document.getElementById("quizBox").style.display="none";
document.getElementById("endScreen").style.display="block";

document.getElementById("finalScore").textContent=
"You scored "+score+" out of "+quiz.length;

let msg="";
if(score===10)
msg="🏆 Recycling legend! Planet thanks you!";
else if(score>=7)
msg="♻️ Awesome work — eco skills strong!";
else if(score>=4)
msg="🌱 Good effort — keep reducing waste!";
else
msg="💚 Learning never stops — try again!";

document.getElementById("message").textContent=msg;
}

loadQuestion();

</script>

</body>
</html>
