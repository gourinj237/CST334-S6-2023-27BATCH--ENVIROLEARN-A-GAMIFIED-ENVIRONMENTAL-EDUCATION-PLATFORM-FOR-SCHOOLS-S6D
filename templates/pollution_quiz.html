<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌫 Pollution Quiz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Courier New', Courier, monospace;
    background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("{{ url_for('static', filename='new1.jpeg') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    color:white;
    padding:20px;
}

.title{
    font-size:40px;
    text-align:center;
    padding-top:20px;
}

.quizBox{
    background:white;
    color:black;
    max-width:700px;
    width:100%;
    margin:40px auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.timer{
    font-size:20px;
    color:red;
    font-weight:bold;
    text-align:right;
}

.question{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

.option{
    background:#f1f1f1;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#dff5e1;
}

.correct{
    background:#b7f5c5 !important;
}

.wrong{
    background:#f5b7b7 !important;
}

.result{
    text-align:center;
    font-size:26px;
    font-weight:bold;
}

.emoji{
    font-size:60px;
}

@media (max-width:768px){
    .title{font-size:28px;}
    .quizBox{padding:20px;margin:20px auto;}
    .question{font-size:18px;}
    .option{font-size:14px;padding:10px;}
    .timer{font-size:16px;}
    .result{font-size:20px;}
    .emoji{font-size:45px;}
}

/* Top Right Back Button */
.top-right{
    position:absolute;
    top:20px;
    right:30px;
}

.back-btn{
    background:white;
    color:#2ecc71;
    padding:10px 18px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    transition:0.3s;
}

.back-btn:hover{
    background:#e8fff1;
    transform:scale(1.05);
}
</style>
</head>

<body>
<div class="top-right">
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>
<h1 class="title">🌫 Pollution Quiz</h1>

<div class="quizBox" id="quizBox">

<div class="timer">
Time Left: <span id="time">30</span>s
</div>

<div id="question" class="question"></div>
<div id="options"></div>

</div>

<script>

// ================= QUIZ DATA =================

var quiz=[

{
question:"1. What is pollution?",
options:["Clean environment","Contamination of environment","Fresh air","Healthy water"],
answer:1
},

{
question:"2. Which causes air pollution?",
options:["Trees","Vehicles","Oxygen","Plants"],
answer:1
},

{
question:"3. Which pollution affects water?",
options:["Noise pollution","Water pollution","Air pollution","Land pollution"],
answer:1
},

{
question:"4. Which gas causes pollution?",
options:["Oxygen","Carbon dioxide","Hydrogen","Nitrogen"],
answer:1
},

{
question:"5. How can we reduce pollution?",
options:["Plant trees","Burn plastic","Cut trees","Throw waste"],
answer:0
}

];

var index=0;
var score=0;
var timeLeft=30;
var timer;

// ================= TIMER =================

function startTimer()
{
    timeLeft=30;
    document.getElementById("time").innerHTML=timeLeft;

    timer=setInterval(function(){
        timeLeft--;
        document.getElementById("time").innerHTML=timeLeft;

        if(timeLeft==0)
        {
            clearInterval(timer);
            index++;
            nextQuestion();
        }

    },1000);
}

// ================= LOAD QUESTION =================

function loadQuestion()
{
    clearInterval(timer);

    document.getElementById("question").innerHTML=quiz[index].question;

    var optionsHTML="";

    for(var i=0;i<quiz[index].options.length;i++)
    {
        optionsHTML+=
        "<div class='option' onclick='checkAnswer("+i+")'>"+
        quiz[index].options[i]+"</div>";
    }

    document.getElementById("options").innerHTML=optionsHTML;

    startTimer();
}

// ================= CHECK ANSWER =================

function checkAnswer(selected)
{
    clearInterval(timer);

    var options=document.getElementsByClassName("option");

    if(selected==quiz[index].answer)
    {
        options[selected].classList.add("correct");
        score+=10;
    }
    else
    {
        options[selected].classList.add("wrong");
        options[quiz[index].answer].classList.add("correct");
    }

    for(var i=0;i<options.length;i++)
    {
        options[i].style.pointerEvents="none";
    }

    setTimeout(function(){
        index++;
        nextQuestion();
    },1000);
}

// ================= NEXT QUESTION =================

function nextQuestion()
{
    if(index<quiz.length)
    {
        loadQuestion();
    }
    else
    {
        showResult();
    }
}

// ================= SHOW RESULT =================

function showResult()
{
    sendScoreToBackend();   // 🔥 SEND SCORE

    var message="";

    if(score<30)
    {
        message=`
        <div class="result">
        <div class="emoji">🌍😢</div>
        Your Score: ${score} / 50 <br><br>
        Best try! Try again next time.<br>
        Protect Earth and keep learning 🌱
        </div>
        `;
    }
    else
    {
        message=`
        <div class="result">
        <div class="emoji">🏆🌍😊</div>
        Your Score: ${score} / 50 <br><br>
        Congratulations!<br>
        You are an Earth Protector! 🌱
        </div>
        `;
    }

    document.getElementById("quizBox").innerHTML=message;
}

// ================= SEND SCORE TO BACKEND =================

function sendScoreToBackend()
{
    const data = new FormData();
    data.append("video_id", "1");   // Pollution video ID
    data.append("score", score);

    fetch("/submit-quiz-score", {
        method: "POST",
        body: data
    });
}

// START QUIZ
loadQuestion();
function goBack(){
    window.location.href = "{{ url_for('videos') }}";
}
</script>

</body>
</html>
