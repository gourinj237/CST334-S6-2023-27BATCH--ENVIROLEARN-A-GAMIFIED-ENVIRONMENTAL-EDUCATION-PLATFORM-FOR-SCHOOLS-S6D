<!DOCTYPE html>
<html>
<head>
<title>🌫 Pollution Quiz</title>

<style>


body{
    margin:0;
    font-family:'Courier New', Courier, monospace;
    background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("/Images/new1.jpeg");
    background-size:cover;
    background-position:center;
    min-height:100vh;
    color:white;
}


.title{
    font-size:40px;
    text-align:center;
    padding-top:30px;
}


.quizBox{
    background:white;
  
    color:black;
    width:700px;
    margin:40px auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}


.timer{
    font-size:20px;
    color:red;
    font-weight:bold;
    text-align:right;
}


.question{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}


.option{
    background:#f1f1f1;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
}

.option:hover{
    background:#dff5e1;
}


.result{
    text-align:center;
    font-size:26px;
    font-weight:bold;
}

.emoji{
    font-size:60px;
}

</style>

</head>

<body>

<h1 class="title">🌫 Pollution Quiz</h1>

<div class="quizBox" id="quizBox">

<div class="timer">
Time Left: <span id="time">30</span>s
</div>

<div id="question" class="question"></div>

<div id="options"></div>

</div>

<script>


var quiz=[

{
question:"1. What is pollution?",
options:["Clean environment","Contamination of environment","Fresh air","Healthy water"],
answer:1
},

{
question:"2. Which causes air pollution?",
options:["Trees","Vehicles","Oxygen","Plants"],
answer:1
},

{
question:"3. Which pollution affects water?",
options:["Noise pollution","Water pollution","Air pollution","Land pollution"],
answer:1
},

{
question:"4. Which gas causes pollution?",
options:["Oxygen","Carbon dioxide","Hydrogen","Nitrogen"],
answer:1
},

{
question:"5. How can we reduce pollution?",
options:["Plant trees","Burn plastic","Cut trees","Throw waste"],
answer:0
}

];

var index=0;
var score=0;
var timeLeft=30;
var timer;


function startTimer()
{
timeLeft=30;
document.getElementById("time").innerHTML=timeLeft;

timer=setInterval(function(){

timeLeft--;
document.getElementById("time").innerHTML=timeLeft;

if(timeLeft==0)
{
clearInterval(timer);
index++;
nextQuestion();
}

},1000);
}


function loadQuestion()
{
clearInterval(timer);

document.getElementById("question").innerHTML=quiz[index].question;

var optionsHTML="";

for(var i=0;i<quiz[index].options.length;i++)
{
optionsHTML+="<div class='option' onclick='checkAnswer("+i+")'>"
+quiz[index].options[i]+"</div>";
}

document.getElementById("options").innerHTML=optionsHTML;

startTimer();
}


function checkAnswer(selected)
{
clearInterval(timer);

if(selected==quiz[index].answer)
{
score+=10;
}

index++;
nextQuestion();
}


function nextQuestion()
{
if(index<quiz.length)
{
loadQuestion();
}
else
{
showResult();
}
}


function showResult()
{
var message="";

if(score<30)
{
message=`
<div class="result">

<div class="emoji">🌍😢</div>

Your Score: ${score} / 50 <br><br>

Best try! Try again next time.<br>

Protect Earth and keep learning 🌱

</div>
`;
}
else
{
message=`
<div class="result">

<div class="emoji">🏆🌍😊</div>

Your Score: ${score} / 50 <br><br>

Congratulations!<br>

You are an Earth Protector! 🌱

</div>
`;
}

document.getElementById("quizBox").innerHTML=message;
}


loadQuestion();

</script>

</body>
</html>
