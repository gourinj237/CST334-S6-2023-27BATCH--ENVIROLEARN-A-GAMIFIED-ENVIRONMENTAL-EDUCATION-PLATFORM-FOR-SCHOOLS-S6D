<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodiversity Awareness Video</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Courier New', Courier, monospace;
    background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url("{{ url_for('static', filename='videoback.jpeg') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    color:white;
    padding:20px;
}

/* ---------- Back Button ---------- */

.backBtn{
    position:fixed;
    top:20px;
    right:20px;
    background:#2ecc71;
    color:white;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    z-index:1000;
    transition:0.3s;
}

.backBtn:hover{
    background:#27ae60;
}

/* ---------- Titles ---------- */

.title{
    font-size:40px;
    padding-top:30px;
    text-align:center;
    font-weight:bold;
}

.subtitle{
    font-size:20px;
    text-align:center;
    margin-bottom:30px;
    font-weight:bold;
}

/* ---------- Video Box ---------- */

.videoBox{
    background:white;
    color:black;
    max-width:700px;
    width:100%;
    margin:0 auto 40px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
    text-align:center;
}

video{
    width:100%;
    height:auto;
    border-radius:10px;
}

/* ---------- Button ---------- */

.unlockBtn{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    font-weight:bold;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.unlockBtn:hover{
    background:#27ae60;
    transform:scale(1.05);
}

#message{
    margin-top:15px;
    font-weight:bold;
    color:red;
}

/* ---------- Mobile Responsive ---------- */

@media (max-width:768px){

    .title{
        font-size:28px;
        padding-top:60px;
    }

    .subtitle{
        font-size:16px;
    }

    .videoBox{
        padding:18px;
    }

    .unlockBtn{
        font-size:16px;
        padding:10px 20px;
    }

    .backBtn{
        font-size:14px;
        padding:8px 14px;
    }
}

</style>
</head>

<body>

<!-- Back Button -->
<button class="backBtn" onclick="goBack()">
← Back
</button>

<h1 class="title">🐼 Biodiversity Awareness</h1>

<p class="subtitle">
Watch at least 80% of the video to unlock the quiz
</p>

<div class="videoBox">

<h2>🌍 Learn about Biodiversity</h2>

<video id="videoPlayer" controls>
    <source src="{{ url_for('static', filename='biodiversity.mp4') }}" type="video/mp4">
    Your browser does not support the video tag.
</video>

<br>

<button class="unlockBtn" onclick="unlockQuiz()">
🔓 Unlock Quiz
</button>

<div id="message"></div>

</div>

<script>

let highestPercent = 0;
let lastSavedPercent = 0;

const video = document.getElementById("videoPlayer");

/* Track video progress */
video.addEventListener("timeupdate", function () {

    if (video.duration > 0) {

        let percent = Math.floor((video.currentTime / video.duration) * 100);

        if (percent > highestPercent) {
            highestPercent = percent;
        }

        // Save only every 5% to reduce DB calls
        if (highestPercent >= lastSavedPercent + 5) {

            lastSavedPercent = highestPercent;

            const formData = new FormData();
            formData.append("video_id", "{{ video_id }}");
            formData.append("percent", highestPercent);

            fetch("/save-video-progress", {
                method: "POST",
                body: formData
            });
        }
    }
});


function unlockQuiz()
{
    if (highestPercent < 80)
    {
        document.getElementById("message").innerHTML =
        "⚠ Please watch at least 80% of the video!";
    }
    else
    {
        window.location.href = "{{ url_for('biodiversity_quiz') }}";
    }
}

function goBack()
{
    window.location.href = "{{ url_for('videos') }}";
}

</script>

</body>
</html>
