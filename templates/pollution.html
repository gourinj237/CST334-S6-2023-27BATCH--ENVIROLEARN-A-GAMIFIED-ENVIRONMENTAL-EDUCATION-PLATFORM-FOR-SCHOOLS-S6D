<!DOCTYPE html>
<html>
<head>
<title>Pollution Awareness Video</title>

<style>


body{
    margin:0;
    font-family:'Courier New', Courier, monospace;
    background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url("/Images/videoback.jpeg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    color:white;
}


.title{
    font-size:40px;
    padding-top:30px;
    text-align:center;
    font-weight:bold;
}


.subtitle{
    font-size:20px;
    text-align:center;
    margin-bottom:30px;
    font-weight:bold;
}


.videoBox{
    background:white;
    color:black;
    width:700px;
    margin:auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
    text-align:center;
}


video{
    width:100%;
    border-radius:10px;
}


.unlockBtn{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    font-weight:bold;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}


.unlockBtn:hover{
    background:#27ae60;
    transform:scale(1.05);
}


#message{
    margin-top:15px;
    font-weight:bold;
    color:red;
}

</style>

</head>

<body>

<h1 class="title">🌫 Pollution Awareness</h1>

<p class="subtitle">
Watch the video completely to unlock the quiz
</p>

<div class="videoBox">

<h2>🌍 Learn about Pollution</h2>

<video id="videoPlayer" controls>
    <source src="pollution.mp4" type="video/mp4">
</video>

<br>

<button class="unlockBtn" onclick="unlockQuiz()">
🔓 Unlock Quiz
</button>

<div id="message"></div>

</div>

<script>

function unlockQuiz()
{
    var video = document.getElementById("videoPlayer");

    if(video.currentTime < video.duration - 2)
    {
        document.getElementById("message").innerHTML =
        "⚠ Please watch full video first!";
    }
    else
    {
        window.location.href = "pollution_quiz.html";
    }
}

</script>

</body>
</html>
