<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollution Awareness Video</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Courier New', Courier, monospace;
}

body{
    background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url("{{ url_for('static', filename='videoback.jpeg') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    color:white;
    padding:20px;
}

.title{
    font-size:40px;
    text-align:center;
    font-weight:bold;
    margin-top:20px;
}

.subtitle{
    font-size:20px;
    text-align:center;
    margin:15px auto 30px auto;
    font-weight:bold;
    max-width:600px;
}

.videoBox{
    background:white;
    color:black;
    max-width:700px;
    width:100%;
    margin:0 auto 40px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
    text-align:center;
}

video{
    width:100%;
    height:auto;
    border-radius:10px;
}

.unlockBtn{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    font-weight:bold;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.unlockBtn:hover{
    background:#27ae60;
    transform:scale(1.05);
}

#message{
    margin-top:15px;
    font-weight:bold;
    color:red;
}

@media (max-width:768px){
    .title{font-size:28px;}
    .subtitle{font-size:16px;}
    .videoBox{padding:18px;}
    .unlockBtn{font-size:16px;padding:10px 20px;}
}
/* Top Right Back Button */
.top-right{
    position:absolute;
    top:20px;
    right:30px;
}

.back-btn{
    background:white;
    color:#2ecc71;
    padding:10px 18px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    transition:0.3s;
}

.back-btn:hover{
    background:#e8fff1;
    transform:scale(1.05);
}

.top-right{
    position: fixed;   /* stays at top even when scrolling */
    top: 20px;
    right: 30px;
    z-index: 1000;
}

.back-btn{
    background: white;
    color: #2ecc71;
    padding: 10px 18px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: 0.3s ease;
}

.back-btn:hover{
    background: #e8fff1;
    transform: scale(1.05);
}
</style>
</head>

<body>
<!-- Back Button -->
<div class="top-right">
    <button class="back-btn" onclick="goBack()">
        ← Back
    </button>
</div>
<h1 class="title">🌫 Pollution Awareness</h1>

<p class="subtitle">
Watch at least 80% of the video to unlock the quiz
</p>

<div class="videoBox">

<h2>🌍 Learn about Pollution</h2>

<video id="videoPlayer" controls>
    <source src="{{ url_for('static', filename='pollution.mp4') }}" type="video/mp4">
    Your browser does not support the video tag.
</video>

<br>

<button class="unlockBtn" onclick="unlockQuiz()">
🔓 Unlock Quiz
</button>

<div id="message"></div>

</div>

<script>

let highestPercent = 0;
let lastSavedPercent = 0;

const video = document.getElementById("videoPlayer");

// ================= SAVE PROGRESS =================

video.addEventListener("timeupdate", function () {

    if (video.duration > 0) {

        let percent = Math.floor((video.currentTime / video.duration) * 100);

        if (percent > highestPercent) {
            highestPercent = percent;
        }

        // Save every 5% only
        if (highestPercent >= lastSavedPercent + 5) {

            lastSavedPercent = highestPercent;

            const formData = new FormData();
            formData.append("video_id", "1");   // Pollution ID
            formData.append("percent", highestPercent);

            fetch("/save-video-progress", {
                method: "POST",
                body: formData
            });
        }
    }
});

// ================= UNLOCK QUIZ =================

function unlockQuiz()
{
    if (highestPercent < 80)
    {
        document.getElementById("message").innerHTML =
        "⚠ Please watch at least 80% of the video!";
    }
    else
    {
        window.location.href = "{{ url_for('pollution_quiz') }}";
    }
}

function goBack()
{
    window.location.href = "{{ url_for('videos') }}";
}
</script>

</body>
</html>
