<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy & Carbon Smart Living</title>

<style>
body{
    margin:0;
    font-family:'Courier New', Courier, monospace;
    min-height:100vh;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4);
    color:#222;
}

.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{ text-align:center; }

#question{
    font-size:20px;
    margin-bottom:20px;
}

.option{
    display:block;
    background:#f1f1f1;
    margin:10px 0;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
}

.option:hover{ background:#fad0c4; }

#feedback{
    margin-top:15px;
    font-weight:bold;
    min-height:24px;
}

button{
    padding:12px 20px;
    margin-top:20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#ff9a9e;
    color:white;
    cursor:pointer;
}

.btnRow{
    display:flex;
    justify-content:flex-end;
}

#scoreBox{
    text-align:right;
    font-weight:bold;
}

#endScreen{
    text-align:center;
    display:none;
}

.correct{
    background:#2ecc71 !important;
    color:white;
}

.wrong{
    background:#e74c3c !important;
    color:white;
}

#saveStatus{
    margin-top:15px;
    font-weight:bold;
    color:green;
}

/* Top Right Back Button */
.top-right{
    position:absolute;
    top:20px;
    right:30px;
}

.back-btn{
    background:white;
    color:#2ecc71;
    padding:10px 18px;
    font-size:15px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.back-btn:hover{
    background:#e8fff1;
    transform:scale(1.05);
}
</style>
</head>

<body>
<div class="top-right">
    <button class="back-btn" onclick="goBack()">Back</button>
</div>
<div class="container" id="quizBox">

<h1>⚡ Energy & Carbon Smart Living</h1>

<div id="scoreBox">
Score: <span id="score">0</span>/10
</div>

<div id="question"></div>
<div id="options"></div>
<div id="feedback"></div>

<div class="btnRow"> 
    <button onclick="nextQuestion()">Next</button>
</div> 

</div>

<div class="container" id="endScreen">
    <h1>🌍 Smart Living Complete!</h1>
    <h2 id="finalScore"></h2>
    <p id="message"></p>
    <div id="saveStatus"></div>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>

const quiz = [
{q:"Which action reduces household electricity use?",o:["Leaving lights on","Using LED bulbs","Running AC all day","Overcharging devices"],a:1},
{q:"What gas is mainly responsible for global warming?",o:["Oxygen","Carbon dioxide","Nitrogen","Helium"],a:1},
{q:"Riding a bicycle instead of a car helps:",o:["Increase fuel use","Reduce carbon footprint","Waste energy","Heat the planet"],a:1},
{q:"Which appliance saves more energy?",o:["Old incandescent bulb","LED bulb","Broken lamp","Halogen heater"],a:1},
{q:"Solar panels generate energy from:",o:["Wind","Coal","Sunlight","Water"],a:2},
{q:"Turning off devices when not in use prevents:",o:["Carbon emissions","Energy saving","Energy waste","Recycling"],a:2},
{q:"Carbon footprint refers to:",o:["Shoe size","Pollution caused by activities","Foot temperature","Walking distance"],a:1},
{q:"Which is a renewable energy source?",o:["Petrol","Coal","Wind","Diesel"],a:2},
{q:"Using public transport helps:",o:["Increase emissions","Reduce emissions","Waste fuel","Stop movement"],a:1},
{q:"Best way to reduce cooling energy use?",o:["Open windows with AC on","Set moderate AC temperature","Run AC at max always","Keep doors open"],a:1}
];

let index=0;
let score=0;
let answered=false;

function loadQuestion(){
answered=false;
document.getElementById("feedback").textContent="";
let q=quiz[index];
document.getElementById("question").textContent=q.q;

let optionsHTML="";
q.o.forEach((opt,i)=>{
optionsHTML+=`<div class="option" onclick="select(${i})">${opt}</div>`;
});
document.getElementById("options").innerHTML=optionsHTML;
}

function select(i){
if(answered) return;
answered=true;

let correct=quiz[index].a;
let optionDivs=document.querySelectorAll(".option");

optionDivs.forEach((div,idx)=>{
    if(idx===correct) div.classList.add("correct");
    if(idx===i && i!==correct) div.classList.add("wrong");
    div.style.pointerEvents="none";
});

if(i===correct){
    score++;
    document.getElementById("feedback").textContent="⚡ Smart choice! Energy saved!";
}
else{
    document.getElementById("feedback").textContent="🌱 Keep going — smart habits take practice!";
}

document.getElementById("score").textContent=score;
}

function nextQuestion(){
if(!answered) return;
index++;
if(index>=quiz.length){ endQuiz(); return; }
loadQuestion();
}

function endQuiz(){
document.getElementById("quizBox").style.display="none";
document.getElementById("endScreen").style.display="block";

document.getElementById("finalScore").textContent=
"You scored "+score+" out of "+quiz.length;

let msg="";
if(score===10)
msg="🏆 Energy genius! Carbon footprint shrinking!";
else if(score>=7)
msg="🌍 Great job — you're living smarter already!";
else if(score>=4)
msg="🌱 Good start — small changes make big impact!";
else
msg="💚 No worries — awareness is step one!";

document.getElementById("message").textContent=msg;

// ✅ Save score to backend (NO redirect)
fetch("/save-quiz4-score", {
    method: "POST",
    headers: {
        "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "score=" + score + "&quiz_name=EnergyQuiz"
})
.then(response => response.json())
.then(data => {
    document.getElementById("saveStatus").textContent =
    "✅ Score saved successfully!";
})
.catch(error => {
    document.getElementById("saveStatus").textContent =
    "";
});
}

loadQuestion();
function goBack(){
    window.location.href = "{{ url_for('home') }}";
}

function goBack(){
    window.location.href = "{{ url_for('quizzes') }}";
}
</script>

</body>
</html>
