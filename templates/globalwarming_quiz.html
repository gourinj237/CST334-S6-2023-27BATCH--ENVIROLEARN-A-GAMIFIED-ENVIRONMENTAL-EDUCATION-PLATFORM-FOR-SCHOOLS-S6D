<!DOCTYPE html>
<html>
<head>
<title>🌍 Global Warming Quiz</title>

<style>

body{
    margin:0;
    font-family:'Courier New', Courier, monospace;
    background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("/Images/new1.jpeg");
    background-size:cover;
    background-position:center;
    min-height:100vh;
    color:white;
}

.title{
    font-size:40px;
    text-align:center;
    padding-top:30px;
}

.quizBox{
    background:white;
     
    color:black;
    width:700px;
    margin:40px auto;
    padding:30px;
    border-radius:15px;
}

.timer{
    font-size:20px;
    color:red;
    text-align:right;
}

.question{
    font-size:22px;
    margin-bottom:20px;
}

.option{
    background:#f1f1f1;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
}

.option:hover{
    background:#dff5e1;
}

.result{
    text-align:center;
    font-size:26px;
}

.emoji{
    font-size:60px;
}

</style>

</head>

<body>

<h1 class="title">🌍 Global Warming Quiz</h1>

<div class="quizBox" id="quizBox">

<div class="timer">
Time Left: <span id="time">30</span>s
</div>

<div id="question" class="question"></div>

<div id="options"></div>

</div>

<script>

var quiz=[

{
question:"1. What is global warming?",
options:["Cooling of Earth","Increase in Earth's temperature","Rainfall increase","Snowfall"],
answer:1
},

{
question:"2. Main cause of global warming?",
options:["Trees","Greenhouse gases","Rain","Oxygen"],
answer:1
},

{
question:"3. Which gas causes global warming?",
options:["Oxygen","Carbon dioxide","Nitrogen","Hydrogen"],
answer:1
},

{
question:"4. Global warming causes?",
options:["Ice melting","More forests","Clean air","Healthy oceans"],
answer:0
},

{
question:"5. How to reduce global warming?",
options:["Plant trees","Cut forests","Burn fuel","Waste energy"],
answer:0
}

];

var index=0;
var score=0;
var timeLeft=30;
var timer;

function startTimer()
{
timeLeft=30;
document.getElementById("time").innerHTML=timeLeft;

timer=setInterval(function(){

timeLeft--;
document.getElementById("time").innerHTML=timeLeft;

if(timeLeft==0)
{
clearInterval(timer);
index++;
nextQuestion();
}

},1000);
}

function loadQuestion()
{
clearInterval(timer);

document.getElementById("question").innerHTML=quiz[index].question;

var optionsHTML="";

for(var i=0;i<quiz[index].options.length;i++)
{
optionsHTML+="<div class='option' onclick='checkAnswer("+i+")'>"
+quiz[index].options[i]+"</div>";
}

document.getElementById("options").innerHTML=optionsHTML;

startTimer();
}

function checkAnswer(selected)
{
clearInterval(timer);

var options=document.getElementsByClassName("option");

if(selected==quiz[index].answer)
{
options[selected].classList.add("correct");
score+=10;
}
else
{
options[selected].classList.add("wrong");
options[quiz[index].answer].classList.add("correct");
}


for(var i=0;i<options.length;i++)
{
options[i].style.pointerEvents="none";
}


setTimeout(function(){
index++;
nextQuestion();
},1000);

}


function nextQuestion()
{
if(index<quiz.length)
{
loadQuestion();
}
else
{
showResult();
}
}

function showResult()
{
var message="";

if(score<30)
{
message=`
<div class="result">
<div class="emoji">🌍😢</div>
Your Score: ${score} / 50 <br><br>
Best try! Try again next time.<br>
Protect Earth 🌱
</div>
`;
}
else
{
message=`
<div class="result">
<div class="emoji">🏆🌍😊</div>
Your Score: ${score} / 50 <br><br>
Congratulations!<br>
You are a Nature Protector!
</div>
`;
}

document.getElementById("quizBox").innerHTML=message;
}

loadQuestion();

</script>

</body>
</html>
