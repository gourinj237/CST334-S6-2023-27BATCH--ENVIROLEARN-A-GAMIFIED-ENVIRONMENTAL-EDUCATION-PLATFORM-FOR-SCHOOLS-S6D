<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Biodiversity Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Courier New', Courier, monospace;
    background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("{{ url_for('static', filename='new1.jpeg') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
    color:white;
    padding:20px;
}

.title{
    font-size:40px;
    text-align:center;
    padding-top:20px;
}

.quizBox{
    background:white;
    color:black;
    max-width:700px;
    width:100%;
    margin:40px auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.timer{
    font-size:20px;
    color:red;
    text-align:right;
    font-weight:bold;
}

.question{
    font-size:22px;
    margin-bottom:20px;
    font-weight:bold;
}

.option{
    background:#f1f1f1;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#dff5e1;
}

.result{
    text-align:center;
    font-size:26px;
    font-weight:bold;
}

.emoji{
    font-size:60px;
}

/* Top Right Back Button */
.top-right{
    position:absolute;
    top:20px;
    right:30px;
}

.back-btn{
    background:white;
    color:#2ecc71;
    padding:10px 18px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    transition:0.3s;
}

.back-btn:hover{
    background:#e8fff1;
    transform:scale(1.05);
}
</style>
</head>

<body>
<div class="top-right">
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>
<h1 class="title">🐼 Biodiversity Quiz</h1>

<div class="quizBox" id="quizBox">

<div class="timer">
Time Left: <span id="time">30</span>s
</div>

<div id="question" class="question"></div>
<div id="options"></div>

</div>

<script>

var quiz=[
{
question:"1. What is biodiversity?",
options:["Variety of living organisms","Only animals","Only plants","Only humans"],
answer:0
},
{
question:"2. Which place has high biodiversity?",
options:["Forest","Desert","Road","Building"],
answer:0
},
{
question:"3. Biodiversity helps in?",
options:["Ecosystem balance","Pollution increase","Global warming","Destruction"],
answer:0
},
{
question:"4. Main cause of biodiversity loss?",
options:["Deforestation","Planting trees","Rain","Sunlight"],
answer:0
},
{
question:"5. How to protect biodiversity?",
options:["Plant trees","Cut forests","Pollute rivers","Destroy habitats"],
answer:0
}
];

var index=0;
var score=0;
var timeLeft=30;
var timer;

function startTimer(){
timeLeft=30;
document.getElementById("time").innerHTML=timeLeft;

timer=setInterval(function(){
timeLeft--;
document.getElementById("time").innerHTML=timeLeft;

if(timeLeft==0){
clearInterval(timer);
index++;
nextQuestion();
}
},1000);
}

function loadQuestion(){
clearInterval(timer);

document.getElementById("question").innerHTML=quiz[index].question;

var optionsHTML="";

for(var i=0;i<quiz[index].options.length;i++){
optionsHTML+="<div class='option' onclick='checkAnswer("+i+")'>"
+quiz[index].options[i]+"</div>";
}

document.getElementById("options").innerHTML=optionsHTML;
startTimer();
}

function checkAnswer(selected){
clearInterval(timer);

if(selected==quiz[index].answer){
score+=10;
}

index++;
nextQuestion();
}

function nextQuestion(){
if(index<quiz.length){
loadQuestion();
}else{
showResult();
}
}

function showResult(){

var message="";

if(score<30){
message=`
<div class="result">
<div class="emoji">🌍😢</div>
Your Score: ${score} / 50 <br><br>
Best try! Try again next time.<br>
Protect Earth 🌱
</div>
`;
}else{
message=`
<div class="result">
<div class="emoji">🏆🌍😊</div>
Your Score: ${score} / 50 <br><br>
Congratulations!<br>
You are a Biodiversity Protector!
</div>
`;
}

document.getElementById("quizBox").innerHTML=message;

/* ✅ SAVE SCORE WITHOUT REDIRECT */
const formData = new FormData();
formData.append("score", score);

fetch("/save-quiz3-score", {
    method: "POST",
    body: formData
});

}

loadQuestion();
function goBack(){
    window.location.href = "{{ url_for('videos') }}";
}
</script>

</body>
</html>
