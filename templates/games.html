<!DOCTYPE html>
<html>
<head>
    <title>Eco Games</title>
    <style>
        body{
            margin:0;
            font-family:'Courier New', Courier, monospace;
            background:linear-gradient(120deg,#a8e063,#56ab2f);
            color:#222;
        }

        .menuBG{
            background:
                linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
                url("/Images/gamebg.png");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            min-height:100vh;
        }

        .title{
            font-size:40px;
            padding-top:40px;
            color:white;
            font-weight: bold;
            text-align: center;
        }

        .subtitle{
            color:rgb(255, 255, 255);
            margin-bottom:40px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        .gameGrid{
            display:grid;
            grid-template-columns: repeat(2, 320px);
            justify-content:center;
            gap:40px;
        }

        .gameCard{
            background:white;
            padding:35px;
            height:80px;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            border-radius:15px;
            cursor: pointer;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
            transition:0.25s;
            font-size:20px;
            font-weight:bold;
        }

        .gameCard:hover{
            transform:scale(1.07);
            background:#e8fff1;
        }

        .gameContainer{
            max-width:700px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        .optionBtn{
            display:block;
            margin:10px auto;
            padding:12px;
            width:80%;
            border:none;
            border-radius:8px;
            background:#e8f8f5;
            cursor:pointer;
            font-size:16px;
            transition:0.2s;
        }

        .optionBtn:hover{
            background:#2ecc71;
            color:white;
        }

        #feedback{
            margin-top:15px;
            font-weight:bold;
        }

        .nextBtn{
            margin-top:15px;
            padding:10px 20px;
            background:#2ecc71;
            border:none;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

        .option{
            display:block;
            background:#f1f1f1;
            margin:10px 0;
            padding:12px;
            border-radius:8px;
            cursor:pointer;
            transition:.2s;
        }

        .option:hover{
            background:#dff5e1;
        }
    </style>
</head>

<body class="menuBG">

<h1 class="title">🌍 Eco Games</h1>
<p class="subtitle">Choose a game and learn how to help the planet!</p>

<div class="gameGrid">

<div class="gameCard" onclick="location.href='waste.html'">
🌱 Waste Segregation Game
</div>

<div class="gameCard" onclick="location.href='carbon.html'">
♻️ Carbon Footprint Calculator
</div>

<div class="gameCard" onclick="location.href='ocean.html'">
🌊 Clean the Ocean
</div>

<div class="gameCard" onclick="location.href='puzzle.html'">
🚀 Eco Puzzle
</div>

</div>

</body>
</html>
