<!DOCTYPE html>
<html>
<head>
    
    <title>Eco Quizzes</title>
    <style>
        body{
            margin:0;
            font-family:'Courier New', Courier, monospace;
            background:linear-gradient(120deg,#a8e063,#56ab2f);
            color:#222;
        }

        .menuBG{
            background:
                linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
                url("{{ url_for('static', filename='bg3.png') }}");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            min-height:100vh;
        }

        .title{
            font-size:40px;
            padding-top:40px;
            color:white;
            font-weight:bold;
            text-align:center;
        }

        .subtitle{
            color:white;
            margin-bottom:40px;
            font-size:20px;
            font-weight:bold;
            text-align:center;
        }

        .quizGrid{
            display:grid;
            grid-template-columns: repeat(2, 320px);
            justify-content:center;
            gap:50px;
        }

        .quizCard{
            background:white;
            padding:35px;
            width:250px;
            border-radius:15px;
            cursor:pointer;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
            transition:0.25s;
            font-size:20px;
            font-weight:bold;
            text-align:center;
        }

        .quizCard:hover{
            transform:scale(1.07);
            background:#e8fff1;
        }

        /* Top Right Dropdown */
.top-right{
    position:absolute;
    top:20px;
    right:30px;
}

.dropdown{
    position:relative;
    display:inline-block;
}

.dropbtn{
    background:white;
    color:#2ecc71;
    padding:10px 18px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.dropbtn:hover{
    background:#e8fff1;
}

.dropdown-content{
    display:none;
    position:absolute;
    right:0;
    background:white;
    min-width:150px;
    box-shadow:0 8px 16px rgba(0,0,0,0.2);
    border-radius:8px;
    overflow:hidden;
    z-index:1;
}

.dropdown-content a{
    color:#222;
    padding:12px 16px;
    text-decoration:none;
    display:block;
    font-weight:bold;
}

.dropdown-content a:hover{
    background:#e8fff1;
}

.dropdown:hover .dropdown-content{
    display:block;
}
    </style>
</head>

<body class="menuBG">

<div class="top-right">
    <div class="dropdown">
        <button class="dropbtn">☰</button>
        <div class="dropdown-content">
            <a href="{{ url_for('index') }}">🏠 Home</a>
            <a href="{{ url_for('home') }}">🚪 Logout</a>
        </div>
    </div>
</div>

<h1 class="title">🌍 Eco Quiz Zone</h1>
<p class="subtitle">Choose a quiz and test your eco-superpowers!</p>

<div class="quizGrid">

<div class="quizCard" onclick="location.href='{{ url_for('quiz1') }}'">
🌱 Planet Protector Basics
</div>

<div class="quizCard" onclick="location.href='{{ url_for('quiz2') }}'">
♻️ Recycling & Waste Master
</div>

<div class="quizCard" onclick="location.href='{{ url_for('quiz3') }}'">
🌊 Ocean & Wildlife Guardians
</div>

<div class="quizCard" onclick="location.href='{{ url_for('quiz4') }}'">
⚡ Energy & Carbon Smart Living
</div>

<div class="quizCard" onclick="location.href='{{ url_for('quiz5') }}'">
🚀 Future Earth Innovators
</div>

<div class="quizCard" onclick="location.href='{{ url_for('quiz6') }}'">
🌦️ Weather & Climate Explorers
</div>

</div>

</body>
</html>
