<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Learning Videos</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Courier New', Courier, monospace;
        }

        body{
            background:linear-gradient(120deg,#a8e063,#56ab2f);
            color:#222;
        }

        /* ---------- FLOATING MENU BUTTON ---------- */

        .menu-container{
            position:fixed;
            top:20px;
            right:20px;
            z-index:1000;
        }

        .menu-btn{
            background:#2ecc71;
            color:white;
            border:none;
            padding:10px 15px;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }

        .menu-dropdown{
            display:none;
            position:absolute;
            right:0;
            margin-top:10px;
            background:white;
            border-radius:8px;
            box-shadow:0 8px 16px rgba(0,0,0,0.2);
            overflow:hidden;
            min-width:140px;
        }

        .menu-dropdown a{
            display:block;
            padding:12px;
            text-decoration:none;
            color:black;
            transition:0.2s;
        }

        .menu-dropdown a:hover{
            background:#f1f1f1;
        }

        /* ---------- Background Section ---------- */

        .menuBG{
            background:
                linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
                url("{{ url_for('static', filename='earth.jpeg') }}");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            min-height:100vh;
            padding:80px 20px 40px 20px;
        }

        /* ---------- Titles ---------- */

        .title{
            font-size:40px;
            color:white;
            font-weight:bold;
            text-align:center;
        }

        .subtitle{
            color:white;
            margin:20px auto 40px auto;
            font-size:18px;
            font-weight:bold;
            text-align:center;
            max-width:600px;
        }

        /* ---------- Video Grid ---------- */

        .videoGrid{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap:30px;
            max-width:900px;
            margin:0 auto;
        }

        /* ---------- Cards ---------- */

        .gameCard{
            background:white;
            padding:35px;
            height:100px;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            border-radius:15px;
            cursor:pointer;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
            transition:0.25s ease;
            font-size:18px;
            font-weight:bold;
        }

        .gameCard:hover{
            transform:scale(1.05);
            background:#e8fff1;
        }

        /* ---------- Responsive ---------- */

        @media (max-width:768px){

            .title{
                font-size:28px;
            }

            .subtitle{
                font-size:16px;
            }

            .gameCard{
                height:auto;
                padding:25px;
                font-size:16px;
            }
        }

    </style>
</head>

<body>

<!-- SIMPLE MENU BUTTON -->
<div class="menu-container">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="menu-dropdown" id="dropdownMenu">
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

<!-- PAGE CONTENT -->
<div class="menuBG">

    <h1 class="title">🎬 Eco Learning Videos</h1>

    <p class="subtitle">
        Select a topic and learn through videos!
    </p>

    <div class="videoGrid">

        <div class="gameCard" onclick="location.href='{{ url_for('pollution_video') }}'">
            🌫 Pollution Video
        </div>

        <div class="gameCard" onclick="location.href='{{ url_for('globalwarming_video') }}'">
            🌍 Global Warming Video
        </div>

        <div class="gameCard" onclick="location.href='{{ url_for('biodiversity_video') }}'">
            🐼 Biodiversity Video
        </div>

    </div>

</div> 

<!-- JAVASCRIPT FOR TOGGLE -->
<script>
function toggleMenu() {
    const menu = document.getElementById("dropdownMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// Close menu when clicking outside
window.onclick = function(event) {
    if (!event.target.matches('.menu-btn')) {
        const dropdown = document.getElementById("dropdownMenu");
        if (dropdown.style.display === "block") {
            dropdown.style.display = "none";
        }
    }
}
</script>

</body>
</html>
